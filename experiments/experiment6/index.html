
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 id="heading">Welcome to JavaScript</h1>

        <input type="text" id="message" placeholder="Enter new heading">

        <p id="paragraph">
            This paragraph will change dynamically using JavaScript events.
        </p>

        <button id="textBtn">Change Heading</button>

        <button id="colorBtn">Change Background</button>

        <button id="fontBtn">Change Font Size</button>

        <button id="toggleBtn">Show / Hide Paragraph</button>

        <button id="resetBtn">Reset Page</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
